{% extends 'base.html' %}

{% block title %}Criar Conta - Ticket Manager{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card">
        <div class="card-header">
            <h2>Criar Nova Conta</h2>
            <p>Preencha os dados abaixo para se cadastrar</p>
        </div>
        <form action="{{ url_for('register') }}" method="POST" class="form-group">
            <div class="form-row">
                <div class="input-wrapper">
                    <label for="nome">Nome</label>
                    <div class="input-icon-group">
                        <i class="fa-solid fa-user-tag input-icon"></i>
                        <input type="text" id="nome" name="nome" required placeholder="Ex: João">
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="sobrenome">Sobrenome</label>
                    <div class="input-icon-group">
                        <i class="fa-solid fa-user-tag input-icon"></i>
                        <input type="text" id="sobrenome" name="sobrenome" required placeholder="Ex: Silva">
                    </div>
                </div>
            </div>

            <div class="input-wrapper">
                <label for="email">E-mail</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" required placeholder="Ex: joao@email.com">
                </div>
            </div>

            <div class="input-wrapper">
                <label for="username">Usuário (Username)</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-at input-icon"></i>
                    <input type="text" id="username" name="username" required placeholder="Ex: joaosilva">
                </div>
            </div>
            
            {% if session.get('tipo_perfil') == 'Admin' %}
            <div class="input-wrapper">
                <label for="tipo_perfil">Perfil do Usuário</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-user-shield input-icon"></i>
                    <select id="tipo_perfil" name="tipo_perfil" required>
                        <option value="Cliente" selected>Cliente</option>
                        <option value="Técnico">Técnico</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            </div>

            <div class="input-wrapper">
                <label for="cidade_id">Cidade / UF</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-city input-icon"></i>
                    <select id="cidade_id" name="cidade_id">
                        <option value="">Selecione uma Cidade...</option>
                        {% for cidade in cidades %}
                            <option value="{{ cidade.id }}">{{ cidade.nome }} - {{ cidade.estado }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            {% endif %}

            <div class="input-wrapper">
                <label for="senha">Senha</label>
                <div class="input-icon-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="senha" name="senha" required placeholder="Crie uma senha forte">
                </div>
            </div>

            <button type="submit" class="btn-primary btn-block">
                <span>Registrar Conta</span> <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>
        <div class="card-footer">
            <p>Já possui uma conta? <a href="{{ url_for('login') }}">Faça login</a></p>
        </div>
    </div>
</div>
{% endblock %}
